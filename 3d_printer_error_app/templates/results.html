<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .result-box { 
            display: inline-block; 
            padding: 20px; 
            background-color: #d9edf7; 
            border: 2px solid #31708f; 
            border-radius: 10px; 
            font-size: 20px; 
            font-weight: bold;
        }
        a { display: block; margin-top: 20px; text-decoration: none; color: white; background: #31708f; padding: 10px 20px; border-radius: 5px; }
        a:hover { background: #245269; }
    </style>
</head>
<body>
    <h1>Prediction Result</h1>
    <div class="result-box">{{ prediction }}</div>
    <a href="/">← Back</a>
</body>
</html>
